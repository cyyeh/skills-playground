<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桃花源記 — 互動學習工具</title>
<style>
  :root {
    --primary: #2c5282;
    --primary-light: #3b6db5;
    --primary-dark: #1e3a5f;
    --accent: #d4576b;
    --accent-light: #e88296;
    --peach: #fbb6a0;
    --peach-bg: #fff5f2;
    --green: #38a169;
    --green-bg: #d5f5e3;
    --blue: #2b6cb0;
    --blue-bg: #daeaf6;
    --purple: #6b46c1;
    --purple-bg: #ede9fe;
    --bg: #f7f9fc;
    --card-bg: #ffffff;
    --text: #2d3748;
    --text-light: #718096;
    --border: #e2e8f0;
    --success: #27ae60;
    --success-bg: #d5f5e3;
    --danger: #e74c3c;
    --danger-bg: #fadbd8;
    --radius: 10px;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
    overflow-x: hidden;
    overscroll-behavior: none;
  }

  .header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    padding: 28px 20px 20px;
    text-align: center;
  }
  .header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; letter-spacing: 2px; }
  .header p { font-size: 0.88rem; opacity: 0.85; }

  /* Tab Nav */
  .tab-nav {
    display: flex;
    background: var(--card-bg);
    border-bottom: 2px solid var(--border);
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
  }
  .tab-btn {
    flex: 1;
    min-width: 100px;
    padding: 13px 8px;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-light);
    border-bottom: 3px solid transparent;
    transition: all 0.25s ease;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--primary); background: #edf2f7; }
  .tab-btn.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
    font-weight: 700;
  }

  .tab-content { display: none; padding: 16px; max-width: 900px; margin: 0 auto; }
  .tab-content.active { display: block; animation: fadeIn 0.35s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  .card h2 { font-size: 1.15rem; color: var(--primary-dark); margin-bottom: 4px; }
  .card .desc { font-size: 0.82rem; color: var(--text-light); margin-bottom: 16px; line-height: 1.5; }

  /* Shared */
  .btn {
    display: inline-block;
    padding: 9px 20px;
    border: none;
    border-radius: 6px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-light); }
  .btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
  .btn-outline:hover { background: var(--primary); color: #fff; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { background: #219a52; }
  .btn-small { padding: 5px 12px; font-size: 0.8rem; }

  .feedback {
    margin-top: 12px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 0.88rem;
    line-height: 1.6;
    display: none;
  }
  .feedback.show { display: block; animation: fadeIn 0.3s ease; }
  .feedback.correct { background: var(--success-bg); border-left: 4px solid var(--success); }
  .feedback.wrong { background: var(--danger-bg); border-left: 4px solid var(--danger); }
  .feedback.info { background: #edf2f7; border-left: 4px solid var(--primary); }

  /* ===== Tab 1: Journey Map ===== */
  .journey-map {
    position: relative;
    width: 100%;
    overflow-x: auto;
  }
  .journey-svg {
    display: block;
    margin: 0 auto;
    max-width: 100%;
    height: auto;
  }
  .journey-node {
    cursor: pointer;
    transition: transform 0.2s, filter 0.2s;
  }
  .journey-node:hover { filter: brightness(1.1); }
  .journey-node.active { filter: drop-shadow(0 0 8px rgba(44,82,130,0.5)); }
  .node-circle {
    transition: r 0.2s, stroke-width 0.2s;
  }
  .journey-node:hover .node-circle { stroke-width: 3; }
  .journey-node.active .node-circle { stroke-width: 4; r: 26; }

  .journey-info {
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-top: 14px;
    min-height: 80px;
  }
  .journey-info h3 { font-size: 1rem; color: var(--primary); margin-bottom: 6px; }
  .journey-info .original {
    background: var(--peach-bg);
    border-left: 4px solid var(--accent);
    padding: 10px 14px;
    margin: 8px 0;
    border-radius: 0 6px 6px 0;
    font-size: 0.95rem;
  }
  .journey-info .translation {
    color: var(--text-light);
    font-size: 0.88rem;
    line-height: 1.6;
  }

  /* ===== Tab 2: Contrast Table ===== */
  .contrast-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .contrast-table th {
    padding: 12px 16px;
    text-align: center;
    font-size: 0.9rem;
    font-weight: 700;
  }
  .contrast-table th:first-child { background: #edf2f7; color: var(--text); }
  .contrast-table th:nth-child(2) { background: var(--primary); color: #fff; }
  .contrast-table th:nth-child(3) { background: var(--accent); color: #fff; }
  .contrast-table td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 0.88rem;
    vertical-align: top;
    cursor: pointer;
    transition: background 0.2s;
  }
  .contrast-table td:first-child {
    font-weight: 600;
    color: var(--primary-dark);
    background: #f8fafc;
    text-align: center;
    min-width: 70px;
  }
  .contrast-table td:nth-child(2) { background: var(--blue-bg); }
  .contrast-table td:nth-child(3) { background: var(--peach-bg); }
  .contrast-table tr:hover td { filter: brightness(0.97); }
  .contrast-table tr.active-row td { box-shadow: inset 0 0 0 2px var(--primary); }

  .contrast-detail {
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-top: 14px;
    font-size: 0.88rem;
    line-height: 1.6;
    min-height: 50px;
  }

  /* ===== Tab 3: Fill in Blanks ===== */
  .fib-passage {
    background: #f8fafc;
    border-radius: var(--radius);
    padding: 18px;
    font-size: 1.05rem;
    line-height: 2.2;
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }
  .fib-blank {
    display: inline-block;
    min-width: 50px;
    padding: 2px 8px;
    border-bottom: 2px dashed var(--primary);
    color: var(--primary);
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 4px;
    text-align: center;
  }
  .fib-blank:hover { background: #edf2f7; }
  .fib-blank.active { background: #dbeafe; border-bottom-style: solid; }
  .fib-blank.correct { background: var(--success-bg); border-bottom-color: var(--success); color: var(--success); }
  .fib-blank.wrong { background: var(--danger-bg); border-bottom-color: var(--danger); color: var(--danger); }
  .fib-blank.filled { min-width: auto; }

  .fib-options {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }
  .fib-option {
    padding: 6px 16px;
    border: 2px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
    background: #fff;
    user-select: none;
  }
  .fib-option:hover { border-color: var(--primary); background: #edf2f7; }
  .fib-option.selected { border-color: var(--primary); background: #dbeafe; color: var(--primary); font-weight: 600; }
  .fib-option.used { opacity: 0.4; cursor: default; pointer-events: none; }

  .fib-controls { display: flex; gap: 8px; flex-wrap: wrap; }
  .fib-score { text-align: center; font-size: 0.9rem; color: var(--text-light); margin-bottom: 12px; }
  .fib-score strong { color: var(--primary); font-size: 1.1rem; }

  /* ===== Tab 4: Theme Explorer ===== */
  .theme-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .theme-card {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: all 0.25s;
    text-align: center;
  }
  .theme-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow); }
  .theme-card.active { border-color: var(--primary); background: #edf2f7; }
  .theme-card .theme-icon { font-size: 2rem; margin-bottom: 8px; display: block; }
  .theme-card .theme-title { font-size: 0.95rem; font-weight: 700; color: var(--primary-dark); margin-bottom: 4px; }
  .theme-card .theme-subtitle { font-size: 0.78rem; color: var(--text-light); }

  .theme-detail {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .theme-detail h3 { font-size: 1.05rem; color: var(--primary); margin-bottom: 10px; }
  .theme-detail .theme-section { margin-bottom: 14px; }
  .theme-detail .theme-section h4 {
    font-size: 0.88rem;
    color: var(--primary-dark);
    margin-bottom: 4px;
    padding-left: 10px;
    border-left: 3px solid var(--primary);
  }
  .theme-detail .theme-section p { font-size: 0.85rem; color: var(--text); line-height: 1.7; margin-top: 4px; }
  .theme-detail .theme-quote {
    background: var(--peach-bg);
    border-left: 4px solid var(--accent);
    padding: 10px 14px;
    border-radius: 0 6px 6px 0;
    font-size: 0.9rem;
    margin: 8px 0;
    font-style: italic;
  }
  .theme-related {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 0.82rem;
    color: var(--text-light);
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 20px;
    font-size: 0.78rem;
    color: var(--text-light);
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }

  @media(max-width:600px) {
    .header h1 { font-size: 1.25rem; }
    .card { padding: 14px; }
    .theme-grid { grid-template-columns: 1fr 1fr; }
    .contrast-table th, .contrast-table td { padding: 8px 10px; font-size: 0.8rem; }
  }
  @media(max-width:400px) {
    .theme-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>桃花源記 — 互動學習工具</h1>
  <p>陶淵明 ・ 東晉</p>
</div>

<div class="tab-nav" id="tabNav">
  <button class="tab-btn active" data-tab="journey">桃花源地圖探索</button>
  <button class="tab-btn" data-tab="contrast">虛實世界對比</button>
  <button class="tab-btn" data-tab="fillblank">文言文填空</button>
  <button class="tab-btn" data-tab="themes">主題探索</button>
</div>

<!-- ==================== Tab 1: Journey Map ==================== -->
<div class="tab-content active" id="tab-journey">
  <div class="card">
    <h2>漁人的旅程</h2>
    <p class="desc">點擊下方旅程路線圖上的各個節點，查看漁人在每個階段的經歷、原文與翻譯。</p>

    <div class="journey-map">
      <svg class="journey-svg" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
        <!-- Path line -->
        <path d="M 80 100 C 160 100, 200 60, 240 80 C 280 100, 320 120, 380 90 C 420 70, 440 50, 480 70 C 520 90, 540 110, 600 100 C 640 95, 680 80, 720 100"
              fill="none" stroke="#cbd5e0" stroke-width="3" stroke-dasharray="8,4"/>

        <!-- Forward path (solid) -->
        <path d="M 80 100 C 160 100, 200 60, 240 80 C 280 100, 320 120, 380 90 C 420 70, 440 50, 480 70"
              fill="none" stroke="#2c5282" stroke-width="3" opacity="0.4"/>

        <!-- Return path (dashed red) -->
        <path d="M 480 70 C 520 90, 540 110, 600 100 C 640 95, 680 80, 720 100"
              fill="none" stroke="#d4576b" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.5"/>

        <!-- Node 1: Fishing -->
        <g class="journey-node" data-node="0" onclick="showJourneyInfo(0)">
          <circle class="node-circle" cx="80" cy="100" r="22" fill="#2c5282" stroke="#1e3a5f" stroke-width="2"/>
          <text x="80" y="96" text-anchor="middle" fill="white" font-size="11" font-weight="700">捕魚</text>
          <text x="80" y="108" text-anchor="middle" fill="white" font-size="9" opacity="0.8">溪行</text>
        </g>

        <!-- Node 2: Peach Forest -->
        <g class="journey-node" data-node="1" onclick="showJourneyInfo(1)">
          <circle class="node-circle" cx="240" cy="80" r="22" fill="#d4576b" stroke="#b33d55" stroke-width="2"/>
          <text x="240" y="76" text-anchor="middle" fill="white" font-size="11" font-weight="700">桃林</text>
          <text x="240" y="88" text-anchor="middle" fill="white" font-size="9" opacity="0.8">落英</text>
        </g>

        <!-- Node 3: Cave -->
        <g class="journey-node" data-node="2" onclick="showJourneyInfo(2)">
          <circle class="node-circle" cx="380" cy="90" r="22" fill="#6b46c1" stroke="#553c9a" stroke-width="2"/>
          <text x="380" y="86" text-anchor="middle" fill="white" font-size="11" font-weight="700">山洞</text>
          <text x="380" y="98" text-anchor="middle" fill="white" font-size="9" opacity="0.8">狹口</text>
        </g>

        <!-- Node 4: Village -->
        <g class="journey-node" data-node="3" onclick="showJourneyInfo(3)">
          <circle class="node-circle" cx="480" cy="70" r="22" fill="#38a169" stroke="#2f855a" stroke-width="2"/>
          <text x="480" y="66" text-anchor="middle" fill="white" font-size="11" font-weight="700">村莊</text>
          <text x="480" y="78" text-anchor="middle" fill="white" font-size="9" opacity="0.8">桃源</text>
        </g>

        <!-- Node 5: Leave -->
        <g class="journey-node" data-node="4" onclick="showJourneyInfo(4)">
          <circle class="node-circle" cx="600" cy="100" r="22" fill="#d69e2e" stroke="#b7791f" stroke-width="2"/>
          <text x="600" y="96" text-anchor="middle" fill="white" font-size="11" font-weight="700">離開</text>
          <text x="600" y="108" text-anchor="middle" fill="white" font-size="9" opacity="0.8">誌之</text>
        </g>

        <!-- Node 6: Lost -->
        <g class="journey-node" data-node="5" onclick="showJourneyInfo(5)">
          <circle class="node-circle" cx="720" cy="100" r="22" fill="#e53e3e" stroke="#c53030" stroke-width="2"/>
          <text x="720" y="96" text-anchor="middle" fill="white" font-size="11" font-weight="700">再訪</text>
          <text x="720" y="108" text-anchor="middle" fill="white" font-size="9" opacity="0.8">迷路</text>
        </g>

        <!-- Direction arrows -->
        <polygon points="172,88 180,84 176,92" fill="#2c5282" opacity="0.6"/>
        <polygon points="318,88 326,82 322,94" fill="#2c5282" opacity="0.6"/>
        <polygon points="435,76 443,72 439,82" fill="#2c5282" opacity="0.6"/>
        <polygon points="545,96 553,90 549,100" fill="#d4576b" opacity="0.6"/>
        <polygon points="665,96 673,90 669,100" fill="#d4576b" opacity="0.6"/>
      </svg>
    </div>

    <div class="journey-info" id="journeyInfo">
      <span style="color:var(--text-light);">點擊上方旅程節點，查看對應的原文與翻譯</span>
    </div>
  </div>
</div>

<!-- ==================== Tab 2: Contrast Table ==================== -->
<div class="tab-content" id="tab-contrast">
  <div class="card">
    <h2>虛實世界對比</h2>
    <p class="desc">桃花源（內）與外面世界的特徵對照。點擊任一行，查看詳細解析。</p>

    <table class="contrast-table" id="contrastTable">
      <thead>
        <tr>
          <th>維度</th>
          <th>桃花源（內）</th>
          <th>外面世界（外）</th>
        </tr>
      </thead>
      <tbody id="contrastBody"></tbody>
    </table>

    <div class="contrast-detail" id="contrastDetail">
      <span style="color:var(--text-light);">點擊表格中的任意一行，查看該維度的詳細分析</span>
    </div>
  </div>
</div>

<!-- ==================== Tab 3: Fill in Blanks ==================== -->
<div class="tab-content" id="tab-fillblank">
  <div class="card">
    <h2>文言文填空練習</h2>
    <p class="desc">原文中的關鍵詞已被挖空，請點擊空格後選擇正確的詞語填入。</p>

    <div class="fib-score">已完成：<strong id="fibCorrect">0</strong> / <strong id="fibTotal">0</strong></div>

    <div class="fib-passage" id="fibPassage"></div>

    <div class="fib-options" id="fibOptions"></div>

    <div class="fib-controls">
      <button class="btn btn-outline" onclick="resetFib()">重新開始</button>
      <button class="btn btn-primary" onclick="checkAllFib()">檢查答案</button>
    </div>

    <div class="feedback" id="fibFeedback"></div>
  </div>
</div>

<!-- ==================== Tab 4: Theme Explorer ==================== -->
<div class="tab-content" id="tab-themes">
  <div class="card">
    <h2>主題探索</h2>
    <p class="desc">《桃花源記》蘊含多層主題意涵。點擊下方主題卡片，深入了解每個主題在文中的體現。</p>

    <div class="theme-grid" id="themeGrid"></div>

    <div class="theme-detail" id="themeDetail" style="display:none;"></div>
  </div>
</div>

<div class="footer">
  桃花源記互動學習工具 — 文言文學習平台
</div>

<script>
/* ================================================================
   TAB SWITCHING
   ================================================================ */
document.querySelectorAll('.tab-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

/* ================================================================
   TAB 1: JOURNEY MAP
   ================================================================ */
var journeyData = [
  {
    title: '捕魚溪行',
    original: '晉太元中，武陵人捕魚為業。緣溪行，忘路之遠近。',
    translation: '東晉太元年間，武陵郡有個以捕魚為生的人。有天他沿著溪流划船前行，忘記了路途的遠近。',
    note: '「忘路之遠近」是進入桃花源的前提——漁人在無意識的狀態下，才得以發現這個秘境。'
  },
  {
    title: '桃花林',
    original: '忽逢桃花林，夾岸數百步，中無雜樹，芳草鮮美，落英繽紛。漁人甚異之，復前行，欲窮其林。',
    translation: '忽然遇見一片桃花林，兩岸綿延數百步，中間沒有其他雜樹，花草鮮嫩美麗，桃花花瓣紛紛飄落。漁人對此非常驚奇，繼續前行，想走到桃花林的盡頭。',
    note: '桃花林是現實世界與理想世界之間的過渡地帶，純淨而夢幻的景象預告了即將到來的世外桃源。'
  },
  {
    title: '穿越山洞',
    original: '林盡水源，便得一山，山有小口，彷彿若有光。便舍船，從口入。初極狹，才通人。復行數十步，豁然開朗。',
    translation: '桃花林在溪水源頭處結束了，出現一座山，山上有個小洞口，隱約好像有光透出。漁人棄船上岸，從洞口進入。起初非常狹窄，僅能容一人通過。又走了幾十步，突然變得開闊明亮。',
    note: '從狹窄到「豁然開朗」的空間轉換，象徵從現實世界進入理想世界的通道，也帶有重生的隱喻。'
  },

var fibState = { activeBlank: null, answers: {}, checked: false };

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function buildFib() {
  fibState = { activeBlank: null, answers: {}, checked: false };
  var passage = document.getElementById('fibPassage');
  var options = document.getElementById('fibOptions');
  var fb = document.getElementById('fibFeedback');
  fb.className = 'feedback';
  fb.style.display = 'none';
  passage.innerHTML = '';
  options.innerHTML = '';

  document.getElementById('fibCorrect').textContent = '0';
  document.getElementById('fibTotal').textContent = fibData.length;

  fibData.forEach(function(item, i) {
    var span = document.createElement('span');
    span.innerHTML = item.before;
    passage.appendChild(span);

    var blank = document.createElement('span');
    blank.className = 'fib-blank';
    blank.dataset.idx = i;
    blank.textContent = '＿＿＿';
    blank.addEventListener('click', function() {
      if (fibState.checked) return;
      document.querySelectorAll('.fib-blank').forEach(function(b) { b.classList.remove('active'); });
      blank.classList.add('active');
      fibState.activeBlank = i;
    });
    passage.appendChild(blank);

    var after = document.createElement('span');
    after.innerHTML = item.after;
    passage.appendChild(after);
  });

  var allAnswers = shuffle(fibData.map(function(item) { return item.blank; }));
  allAnswers.forEach(function(ans) {
    var opt = document.createElement('span');
    opt.className = 'fib-option';
    opt.textContent = ans;
    opt.dataset.answer = ans;
    opt.addEventListener('click', function() {
      if (fibState.checked) return;
      if (fibState.activeBlank === null) return;
      if (opt.classList.contains('used')) return;

      // If this blank already had an answer, free it
      var prevAns = fibState.answers[fibState.activeBlank];
      if (prevAns) {
        var prevOpt = document.querySelector('.fib-option[data-answer="' + prevAns + '"]');
        if (prevOpt) { prevOpt.classList.remove('used', 'selected'); }
      }

      fibState.answers[fibState.activeBlank] = ans;
      opt.classList.add('used', 'selected');

      var blankEl = document.querySelector('.fib-blank[data-idx="' + fibState.activeBlank + '"]');
      blankEl.textContent = ans;
      blankEl.classList.add('filled');
      blankEl.classList.remove('active');
      fibState.activeBlank = null;
    });
    options.appendChild(opt);
  });
}

function checkAllFib() {
  fibState.checked = true;
  var correct = 0;
  fibData.forEach(function(item, i) {
    var blankEl = document.querySelector('.fib-blank[data-idx="' + i + '"]');
    if (fibState.answers[i] === item.blank) {
      blankEl.classList.add('correct');
      blankEl.classList.remove('wrong');
      correct++;
    } else {
      blankEl.classList.add('wrong');
      blankEl.classList.remove('correct');
    }
  });
  document.getElementById('fibCorrect').textContent = correct;

  var fb = document.getElementById('fibFeedback');
  if (correct === fibData.length) {
    fb.className = 'feedback show correct';
    fb.textContent = '太棒了！全部答對！你對桃花源記的原文已經非常熟悉了。';
  } else {
    fb.className = 'feedback show wrong';
    fb.innerHTML = '答對了 ' + correct + ' / ' + fibData.length + ' 題。紅色標記的是錯誤的填空，正確答案如下：<br><br>' +
      fibData.map(function(item, i) {
        if (fibState.answers[i] !== item.blank) {
          return '<strong>' + (i+1) + '.</strong> 正確答案為「<span style="color:var(--success);font-weight:700;">' + item.blank + '</span>」' +
                 (fibState.answers[i] ? '（你填的是「' + fibState.answers[i] + '」）' : '（未填寫）');
        }
        return '';
      }).filter(function(s) { return s; }).join('<br>');
  }
}

function resetFib() {
  buildFib();
}

        text: '陶淵明刻意營造的這種亦真亦幻的效果，是《桃花源記》最精妙的藝術特色。它讓讀者既相信又懷疑，既嚮往又知道不可得——正是這種張力，使桃花源成為中國文學史上最令人魂牽夢繫的意象。'
      }
    ],
    quote: '山有小口，彷彿若有光。便舍船，從口入。',
    related: '相關主題：純真的失落、避世與隱逸'
  }
];

function buildThemes() {
  var grid = document.getElementById('themeGrid');
  themeData.forEach(function(theme, i) {
    var card = document.createElement('div');
    card.className = 'theme-card';
    card.dataset.idx = i;
    card.innerHTML =
      '<span class="theme-icon">' + theme.icon + '</span>' +
      '<div class="theme-title">' + theme.title + '</div>' +
      '<div class="theme-subtitle">' + theme.subtitle + '</div>';
    card.addEventListener('click', function() {
      document.querySelectorAll('.theme-card').forEach(function(c) { c.classList.remove('active'); });
      card.classList.add('active');
      showThemeDetail(i);
    });
    grid.appendChild(card);
  });
}

function showThemeDetail(idx) {
  var theme = themeData[idx];
  var el = document.getElementById('themeDetail');
  el.style.display = 'block';

  var sectionsHtml = theme.sections.map(function(s) {
    return '<div class="theme-section"><h4>' + s.heading + '</h4><p>' + s.text + '</p></div>';
  }).join('');

  el.innerHTML =
    '<h3>' + theme.icon + ' ' + theme.title + '</h3>' +
    sectionsHtml +
    '<div class="theme-quote">' + theme.quote + '</div>' +
    '<div class="theme-related">' + theme.related + '</div>';

  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

buildThemes();
</script>
</body>
</html>
