<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>悲傷諮商與治療 — 互動工具</title>
<style>
  :root {
    --primary: #5B6A8A;
    --primary-light: #7B8DAD;
    --primary-dark: #455270;
    --accent: #C4956A;
    --accent-light: #D4AD8A;
    --bg: #f7fafc;
    --card-bg: #fff;
    --text: #2d3748;
    --text-light: #616b7c;
    --border: #e2e8f0;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,.08);
    --shadow-md: 0 4px 12px rgba(0,0,0,.1);
    --success: #48bb78;
    --warning: #ed8936;
    --info: #4299e1;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overflow-x: hidden;
    overscroll-behavior: none;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 1.5rem; }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: #fff; padding: 2rem 1.5rem; text-align: center;
  }
  .header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: .3rem; }
  .header p { opacity: .85; font-size: .95rem; }

  /* Tabs */
  .tabs {
    display: flex; gap: 2px; background: var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    overflow: hidden; margin-top: 1.5rem;
  }
  .tab-btn {
    flex: 1; padding: .85rem .5rem; border: none; background: #edf2f7;
    cursor: pointer; font-size: .88rem; font-weight: 600;
    color: var(--text-light); transition: all .2s; font-family: inherit;
    text-align: center; line-height: 1.3;
  }
  .tab-btn:hover { background: #e2e8f0; color: var(--text); }
  .tab-btn.active { background: var(--card-bg); color: var(--primary); }
  .tab-content {
    display: none; background: var(--card-bg); padding: 1.5rem;
    border: 1px solid var(--border); border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    box-shadow: var(--shadow);
  }
  .tab-content.active { display: block; }
  .tab-content h2 {
    font-size: 1.2rem; color: var(--primary); margin-bottom: .3rem;
  }
  .tab-content .subtitle {
    color: var(--text-light); font-size: .9rem; margin-bottom: 1.25rem;
  }

  /* Disclaimer */
  .disclaimer {
    background: #fff8f0; border: 1px solid var(--accent-light); border-radius: var(--radius);
    padding: 1rem 1.25rem; margin-top: 1.5rem; font-size: .85rem; color: #7c5a3a;
    line-height: 1.6;
  }
  .disclaimer strong { color: #9c6a3a; }

  /* ============ Tool 1: Comparison Matrix ============ */
  .matrix-controls {
    display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1rem;
  }
  .matrix-controls label {
    font-size: .85rem; display: flex; align-items: center; gap: .35rem;
    cursor: pointer; padding: .35rem .7rem; border-radius: 6px;
    border: 1px solid var(--border); background: #f9fafb; transition: all .2s;
    user-select: none;
  }
  .matrix-controls label:hover { border-color: var(--primary-light); }
  .matrix-controls label.checked {
    background: var(--primary); color: #fff; border-color: var(--primary);
  }
  .matrix-controls input[type="checkbox"] { display: none; }
  .matrix-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .matrix-table {
    width: 100%; border-collapse: collapse; font-size: .85rem;
    min-width: 700px;
  }
  .matrix-table th {
    background: var(--primary); color: #fff; padding: .7rem .6rem;
    text-align: left; font-weight: 600; white-space: nowrap;
    position: sticky; top: 0;
  }
  .matrix-table th:first-child { border-radius: var(--radius) 0 0 0; }
  .matrix-table th:last-child { border-radius: 0 var(--radius) 0 0; }
  .matrix-table td {
    padding: .65rem .6rem; border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .matrix-table tr:hover td { background: #f0f4f8; }
  .matrix-table tr:last-child td { border-bottom: none; }
  .matrix-table td:first-child { font-weight: 600; color: var(--primary-dark); white-space: nowrap; }
  .evidence-badge {
    display: inline-block; padding: .15rem .5rem; border-radius: 4px;
    font-size: .78rem; font-weight: 600;
  }
  .evidence-strong { background: #c6f6d5; color: #276749; }
  .evidence-moderate { background: #fefcbf; color: #975a16; }
  .evidence-emerging { background: #fed7d7; color: #9b2c2c; }
  .highlight-row td { background: #f0f7ff !important; }

  /* ============ Tool 2: Decision Tree ============ */
  .tree-node {
    background: var(--card-bg); border: 2px solid var(--border);
    border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem;
    transition: all .3s;
  }
  .tree-node.active { border-color: var(--primary); box-shadow: var(--shadow-md); }
  .tree-node.completed { border-color: var(--success); opacity: .7; }
  .tree-question {
    font-size: 1.05rem; font-weight: 600; color: var(--primary-dark);
    margin-bottom: .75rem; line-height: 1.5;
  }
  .tree-options { display: flex; flex-direction: column; gap: .5rem; }
  .tree-option {
    padding: .7rem 1rem; border: 1px solid var(--border); border-radius: 8px;
    cursor: pointer; font-size: .9rem; transition: all .2s;
    background: #f9fafb; font-family: inherit; text-align: left;
    line-height: 1.5; display: block; width: 100;
  }
  .tree-option:hover { border-color: var(--primary); background: #eef2f7; }
  .tree-option.selected {
    border-color: var(--primary); background: var(--primary); color: #fff;
  }
  .tree-result {
    background: linear-gradient(135deg, #f0f7ff, #eef5f0);
    border: 2px solid var(--primary-light); border-radius: var(--radius);
    padding: 1.5rem; margin-top: 1rem;
  }
  .tree-result h3 { color: var(--primary); margin-bottom: .5rem; font-size: 1.1rem; }
  .tree-result p { font-size: .92rem; line-height: 1.7; margin-bottom: .5rem; }
  .tree-result ul { padding-left: 1.25rem; margin: .5rem 0; }
  .tree-result li { font-size: .9rem; margin-bottom: .3rem; }
  .tree-restart {
    margin-top: 1rem; padding: .6rem 1.5rem; border: 1px solid var(--primary);
    background: var(--card-bg); color: var(--primary); border-radius: 8px;
    cursor: pointer; font-size: .9rem; font-weight: 600; font-family: inherit;
    transition: all .2s;
  }
  .tree-restart:hover { background: var(--primary); color: #fff; }
  .step-indicator {
    display: flex; align-items: center; gap: .4rem; margin-bottom: 1rem;
    font-size: .82rem; color: var(--text-light);
  }
  .step-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--border);
  }
  .step-dot.filled { background: var(--primary); }
  .step-dot.current { background: var(--accent); width: 10px; height: 10px; }

  /* ============ Tool 3: Worden Tasks ============ */
  .task-nav {
    display: flex; gap: .4rem; margin-bottom: 1.25rem; flex-wrap: nowrap;
    overflow-x: auto; overflow-y: hidden;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .task-nav::-webkit-scrollbar { display: none; }
  .task-nav-btn {
    padding: .5rem 1rem; border: 2px solid var(--border); border-radius: 8px;
    background: var(--card-bg); cursor: pointer; font-size: .85rem;
    font-weight: 600; color: var(--text-light); transition: all .2s;
    font-family: inherit;
  }
  .task-nav-btn:hover { border-color: var(--primary-light); color: var(--primary); }
  .task-nav-btn.active { border-color: var(--primary); color: var(--primary); background: #eef2f7; }
  .task-nav-btn.completed-task { border-color: var(--success); color: var(--success); }
  .task-panel { display: none; }
  .task-panel.active { display: block; }
  .task-description {
    background: #f0f4f8; border-radius: var(--radius); padding: 1.15rem;
    margin-bottom: 1.25rem; border-left: 4px solid var(--primary);
  }
  .task-description h3 { color: var(--primary-dark); font-size: 1rem; margin-bottom: .3rem; }
  .task-description p { font-size: .9rem; color: var(--text-light); }
  .reflection-group { margin-bottom: 1.25rem; }
  .reflection-label {
    font-size: .92rem; font-weight: 600; color: var(--text);
    margin-bottom: .5rem; line-height: 1.5;
  }
  .reflection-textarea {
    width: 100%; min-height: 90px; padding: .75rem; border: 1px solid var(--border);
    border-radius: 8px; font-size: .9rem; font-family: inherit; line-height: 1.6;
    resize: vertical; transition: border-color .2s; color: var(--text);
  }
  .reflection-textarea:focus { outline: none; border-color: var(--primary); }
  .reflection-textarea::placeholder { color: #a0aec0; }
  .task-actions { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: 1rem; }
  .btn-primary {
    padding: .6rem 1.5rem; background: var(--primary); color: #fff;
    border: none; border-radius: 8px; cursor: pointer; font-size: .9rem;
    font-weight: 600; font-family: inherit; transition: background .2s;
  }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-secondary {
    padding: .6rem 1.5rem; background: var(--card-bg); color: var(--primary);
    border: 1px solid var(--primary); border-radius: 8px; cursor: pointer;
    font-size: .9rem; font-weight: 600; font-family: inherit; transition: all .2s;
  }
  .btn-secondary:hover { background: #eef2f7; }
  .save-notice {
    font-size: .82rem; color: var(--success); margin-top: .5rem;
    opacity: 0; transition: opacity .3s;
  }
  .save-notice.show { opacity: 1; }
  .progress-bar {
    height: 6px; background: var(--border); border-radius: 3px;
    margin-bottom: 1.25rem; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent));
    border-radius: 3px; transition: width .5s ease;
  }

  @media (max-width: 600px) {
    .container { padding: 1rem; }
    .header { padding: 1.5rem 1rem; }
    .header h1 { font-size: 1.3rem; }
    .tab-btn { padding: .65rem .3rem; font-size: .78rem; }
    .tab-content { padding: 1rem; }
    .matrix-controls label { font-size: .8rem; padding: .3rem .5rem; }
    .task-nav { gap: .3rem; }
    .task-nav-btn { padding: .4rem .7rem; font-size: .8rem; }
    .tree-option { padding: .6rem .8rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>悲傷諮商與治療：互動工具</h1>
  <p>探索不同治療取向、了解何時尋求幫助、反思你的哀悼歷程</p>
</div>

<div class="container">

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('matrix')">治療取向比較</button>
    <button class="tab-btn" onclick="switchTab('tree')">介入策略決策樹</button>
    <button class="tab-btn" onclick="switchTab('worden')">Worden 四項任務</button>
  </div>

  <!-- ========== TAB 1: Comparison Matrix ========== -->
  <div id="tab-matrix" class="tab-content active">
    <h2>治療取向比較矩陣</h2>
    <p class="subtitle">勾選想比較的面向，點擊列名可以高亮該治療取向。</p>

    <div class="matrix-controls" id="dimControls"></div>
    <div class="matrix-table-wrap">
      <table class="matrix-table" id="matrixTable">
        <thead><tr id="matrixHead"></tr></thead>
        <tbody id="matrixBody"></tbody>
      </table>
    </div>
  </div>

  <!-- ========== TAB 2: Decision Tree ========== -->
  <div id="tab-tree" class="tab-content">
    <h2>介入策略決策樹</h2>
    <p class="subtitle">回答以下問題，了解哪種支持方式可能適合你或你關心的人的情境。</p>
    <div class="step-indicator" id="stepIndicator"></div>
    <div id="treeContainer"></div>
  </div>

  <!-- ========== TAB 3: Worden Tasks ========== -->
  <div id="tab-worden" class="tab-content">
    <h2>Worden 四項哀悼任務——自我反思</h2>
    <p class="subtitle">這不是測驗或診斷工具，而是一個引導你整理自身經驗的反思練習。</p>
    <div class="progress-bar"><div class="progress-fill" id="wordenProgress" style="width:0%"></div></div>
    <div class="task-nav" id="taskNav"></div>
    <div id="taskPanels"></div>
    <div class="save-notice" id="saveNotice">反思內容已暫存於瀏覽器中</div>
  </div>

  <div class="disclaimer">
    <strong>重要提醒：</strong>本頁面所有工具僅供教育與自我反思之用，不構成心理診斷或治療建議。每個人的悲傷經驗都是獨特的，如果你正在經歷困難，請尋求合格的心理健康專業人員協助。台灣安心專線：1925（24小時免費）。
  </div>
</div>

<script>
/* ===== Tab Switching ===== */
function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['matrix','tree','worden'][i] === id);
  });
  document.querySelectorAll('.tab-content').forEach(c => {
    c.classList.toggle('active', c.id === 'tab-' + id);
  });
}

/* ============================================================
   TOOL 1: Comparison Matrix
   ============================================================ */
const dimensions = [
  { key: 'target', label: '適用對象', default: true },
  { key: 'techniques', label: '核心技術', default: true },
  { key: 'evidence', label: '實證基礎', default: true },
  { key: 'duration', label: '典型療程', default: true },
  { key: 'strengths', label: '優勢', default: false },
  { key: 'limitations', label: '限制', default: false },
  { key: 'training', label: '治療師訓練', default: false },
  { key: 'format', label: '治療形式', default: false },
];

const approaches = [
  {
    name: '複雜性悲傷治療\n(CGT)',
    target: '延長性悲傷障礙、複雜性悲傷',
    techniques: '想像式重訪、情境暴露、想像式對話、雙軌工作、悲傷監測',
    evidence: 'strong',
    evidenceText: '強——多項 RCT 支持',
    duration: '16 週，每週一次',
    strengths: '高度結構化、專門設計、療效數據最充分',
    limitations: '需專門訓練、手冊化可能缺乏彈性',
    training: '需完成 CGT 認證訓練課程',
    format: '個別治療',
  },
  {
    name: '意義重建取向\n(Neimeyer)',
    target: '意義崩解的悲傷者、找不到失落意義者',
    techniques: '失落敘事書寫、意義地圖、生命印記、好處發現、虛擬夢境工作',
    evidence: 'moderate',
    evidenceText: '中——後設分析支持',
    duration: '彈性，通常 10-20 次',
    strengths: '尊重個人獨特性、深度意義探索、文化彈性高',
    limitations: '標準化方案較少、需要較高的治療師技巧',
    training: '建構主義心理治療訓練',
    format: '個別或團體',
  },
  {
    name: '認知行為治療\n(CBT)',
    target: '悲傷伴隨焦慮、憂鬱、罪惡感、認知扭曲',
    techniques: '認知重建、行為活化、暴露練習、放鬆訓練、問題解決',
    evidence: 'strong',
    evidenceText: '強——多項後設分析',
    duration: '12-20 週',
    strengths: '技術明確、廣泛適用、容易研究',
    limitations: '可能忽略存在意義層面、部分個案覺得「太理性」',
    training: 'CBT 基礎訓練加悲傷專題',
    format: '個別治療',
  },
  {
    name: 'EMDR',
    target: '創傷性悲傷（突然、暴力、意外死亡）',
    techniques: '雙側刺激、記憶歷程更新、認知嵌入、身體掃描',
    evidence: 'moderate',
    evidenceText: '中——PTSD 證據充分，悲傷研究漸增',
    duration: '8-12 次',
    strengths: '快速處理創傷成分、不需大量語言表達',
    limitations: '悲傷特定 RCT 仍需累積、需認證訓練',
    training: 'EMDR 國際認證訓練（Level I & II）',
    format: '個別治療',
  },
  {
    name: '敘事治療',
    target: '文化壓抑、身份困擾、剝奪性悲傷',
    techniques: '外化對話、重新會員化、獨特結果、見證儀式、治療性文件',
    evidence: 'emerging',
    evidenceText: '弱至中——質性研究為主',
    duration: '彈性',
    strengths: '高度文化敏感、賦權取向、適合被邊緣化的悲傷',
    limitations: '量化實證較少、不適合需要高度結構的個案',
    training: '敘事治療專業訓練',
    format: '個別、家庭或團體',
  },
  {
    name: '表達性藝術治療',
    target: '兒童、語言表達受限者、非語言的悲傷處理',
    techniques: '繪畫、黏土、音樂、舞蹈律動、戲劇、沙遊',
    evidence: 'emerging',
    evidenceText: '弱至中——多為小型研究',
    duration: '彈性，通常 12-20 次',
    strengths: '超越語言限制、適合兒童、提供身體層面的處理',
    limitations: '需要藝術治療專門訓練、量化研究較少',
    training: '藝術治療碩士學位或相關認證',
    format: '個別或團體',
  },
];

let activeDims = new Set(dimensions.filter(d => d.default).map(d => d.key));
let highlightedRow = -1;

function renderMatrixControls() {
  const el = document.getElementById('dimControls');
  el.innerHTML = dimensions.map(d => {
    const checked = activeDims.has(d.key);
    return `<label class="${checked ? 'checked' : ''}" data-dim="${d.key}">
      <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleDim('${d.key}', this)">${d.label}
    </label>`;
  }).join('');
}

function toggleDim(key, cb) {
  if (cb.checked) activeDims.add(key); else activeDims.delete(key);
  cb.parentElement.classList.toggle('checked', cb.checked);
  renderMatrix();
}

function renderMatrix() {
  const dims = dimensions.filter(d => activeDims.has(d.key));
  const head = document.getElementById('matrixHead');
  head.innerHTML = '<th>治療取向</th>' + dims.map(d => `<th>${d.label}</th>`).join('');

  const body = document.getElementById('matrixBody');
  body.innerHTML = approaches.map((a, i) => {
    const cls = i === highlightedRow ? 'highlight-row' : '';
    const cells = dims.map(d => {
      if (d.key === 'evidence') {
        const lvl = a.evidence;
        const cls2 = lvl === 'strong' ? 'evidence-strong' : lvl === 'moderate' ? 'evidence-moderate' : 'evidence-emerging';
        return `<td><span class="evidence-badge ${cls2}">${a.evidenceText}</span></td>`;
      }
      return `<td>${a[d.key]}</td>`;
    }).join('');
    return `<tr class="${cls}" onclick="toggleHighlight(${i})" style="cursor:pointer">
      <td>${a.name.replace('\n','<br>')}</td>${cells}</tr>`;
  }).join('');
}

function toggleHighlight(i) {
  highlightedRow = highlightedRow === i ? -1 : i;
  renderMatrix();
}

renderMatrixControls();
renderMatrix();

/* ============================================================
   TOOL 2: Decision Tree
   ============================================================ */
const treeData = {
  start: {
    question: '你目前最關心的是哪一種情況？',
    options: [
      { text: '我自己正在經歷失落後的悲傷', next: 'self_time' },
      { text: '我關心的人正在經歷悲傷，我想幫助他/她', next: 'other_who' },
      { text: '我是專業工作者，想了解如何為個案選擇介入方式', next: 'prof_type' },
    ]
  },
  self_time: {
    question: '失落發生到現在大約多久了？',
    options: [
      { text: '不到六個月', next: 'self_early' },
      { text: '六個月到一年', next: 'self_mid' },
      { text: '超過一年', next: 'self_long' },
    ]
  },
  self_early: {
    question: '你目前最困擾的是什麼？',
    options: [
      { text: '強烈的情緒波動，但日常生活大致能維持', next: 'result_normal_support' },
      { text: '完全無法正常生活、工作或照顧自己', next: 'result_professional_early' },
      { text: '有傷害自己的念頭', next: 'result_crisis' },
    ]
  },
  self_mid: {
    question: '和失落剛發生時相比，你的狀態有什麼變化？',
    options: [
      { text: '雖然仍然痛苦，但整體有慢慢改善', next: 'result_normal_continued' },

let treePath = ['start'];
let treeHistory = [];

function renderTree() {
  const container = document.getElementById('treeContainer');
  const indicator = document.getElementById('stepIndicator');
  container.innerHTML = '';

  // Step indicator
  const totalSteps = treePath.length;
  indicator.innerHTML = treePath.map((_, i) => {
    const cls = i < totalSteps - 1 ? 'filled' : 'current';
    return `<span class="step-dot ${cls}"></span>`;
  }).join('') + `<span style="margin-left:.3rem">步驟 ${totalSteps}</span>`;

  const currentKey = treePath[treePath.length - 1];
  const node = treeData[currentKey];

  if (node.result) {
    container.innerHTML = `
      <div class="tree-result">
        <h3>${node.title}</h3>
        <p>${node.body}</p>
        <ul>${node.suggestions.map(s => `<li>${s}</li>`).join('')}</ul>
      </div>
      <button class="tree-restart" onclick="restartTree()">重新開始</button>
    `;
    return;
  }

  // Show completed questions
  for (let i = 0; i < treeHistory.length; i++) {
    const h = treeHistory[i];
    const n = treeData[h.nodeKey];
    const selectedOpt = n.options[h.optionIndex];
    container.innerHTML += `
      <div class="tree-node completed">
        <div class="tree-question">${n.question}</div>
        <div class="tree-options">
          <div class="tree-option selected" style="cursor:default">${selectedOpt.text}</div>
        </div>
      </div>`;
  }

  // Current question
  const optionsHtml = node.options.map((opt, i) => `
    <button class="tree-option" onclick="selectTreeOption('${currentKey}', ${i}, '${opt.next}')">${opt.text}</button>
  `).join('');

  container.innerHTML += `
    <div class="tree-node active">
      <div class="tree-question">${node.question}</div>
      <div class="tree-options">${optionsHtml}</div>
    </div>`;
}

function selectTreeOption(nodeKey, optionIndex, nextKey) {
  treeHistory.push({ nodeKey, optionIndex });
  treePath.push(nextKey);
  renderTree();
}

function restartTree() {
  treePath = ['start'];
  treeHistory = [];
  renderTree();
}

renderTree();

      { prompt: '當你想到逝去的人時，你是否有時仍然無法相信他/她已經離開了？這種感覺在什麼時候最強烈？', placeholder: '寫下你的感受和觀察...' },
      { prompt: '有沒有什麼事物（物品、地點、習慣）你一直在迴避面對，因為它們讓失落變得太真實了？', placeholder: '寫下你想到的...' },
      { prompt: '你是否能夠用自己的話，向別人述說你的失落經驗？還是這件事仍然「說不出口」？', placeholder: '試著寫下你的觀察...' },
    ]
  },
  {
    id: 'task2',
    title: '任務二：處理悲傷的痛苦',
    shortTitle: '任務二',
    description: '允許自己經驗並表達悲傷帶來的各種痛苦——不只是情緒上的，也包括身體的、認知的和行為的。壓抑或逃避這些痛苦可能導致悲傷歷程停滯。',
    reflections: [
      { prompt: '你的悲傷除了情緒上的痛苦之外，還有什麼身體上的感受嗎？（如胸口緊、頭痛、疲累、食慾改變）', placeholder: '留意和記錄你身體的感受...' },
      { prompt: '在你的環境中（家庭、職場、文化），你覺得自己「被允許」表達多少悲傷？有沒有壓力讓你覺得必須表現得「沒事」？', placeholder: '寫下你的觀察...' },
      { prompt: '有什麼情緒是你特別難以面對的？（例如憤怒、罪惡感、被遺棄感、解脫感）為什麼這個情緒讓你不舒服？', placeholder: '嘗試探索這些感受...' },

  },
  {
    id: 'task3',
    title: '任務三：適應沒有逝者的世界',

    reflections: [
      { prompt: '逝者離開後，你在生活中需要承擔哪些新的角色或責任？你如何看待這些改變？', placeholder: '思考你的日常生活變化...' },
      { prompt: '「沒有了他/她的我，是誰？」——這個問題對你來說困難嗎？你如何重新定義自己？', placeholder: '寫下你的自我探索...' },
      { prompt: '這次的失落有沒有改變你對生命、世界或人性的基本看法？如果有，是怎樣的改變？', placeholder: '探索你的信念變化...' },

  {

      { prompt: '你用什麼方式與逝者保持連結？（例如：回憶、對話、紀念活動、保留物品、實踐他/她的價值觀）你覺得這些方式對你有幫助嗎？', placeholder: '思考你的持續連結方式...' },
      { prompt: '你是否開始（或害怕開始）投入新的活動、關係或人生目標？是什麼讓你前進，又是什麼讓你猶豫？', placeholder: '寫下你的想法和感受...' },
      { prompt: '如果逝者能看到現在的你，你覺得他/她會對你說什麼？', placeholder: '試著想像這段對話...' },

];

let currentTaskIndex = 0;
const STORAGE_KEY = 'worden_reflections';

function loadSavedData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : {};
  } catch { return {}; }
}

function saveData(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    const notice = document.getElementById('saveNotice');
    notice.classList.add('show');
    setTimeout(() => notice.classList.remove('show'), 2000);
  } catch {}
}

function getCompletionCount() {
  const data = loadSavedData();
  let completed = 0;
  wordenTasks.forEach(task => {
    const allFilled = task.reflections.every((_, ri) => {
      const key = `${task.id}_r${ri}`;
      return data[key] && data[key].trim().length > 0;
    });
    if (allFilled) completed++;
  });
  return completed;
}

function renderWordenNav() {
  const nav = document.getElementById('taskNav');
  const data = loadSavedData();
  nav.innerHTML = wordenTasks.map((task, i) => {
    const allFilled = task.reflections.every((_, ri) => {
      const key = `${task.id}_r${ri}`;
      return data[key] && data[key].trim().length > 0;
    });
    let cls = i === currentTaskIndex ? 'active' : '';
    if (allFilled) cls += ' completed-task';
    return `<button class="task-nav-btn ${cls}" onclick="switchTask(${i})">${task.shortTitle}</button>`;
  }).join('');

  // Update progress bar
  const completed = getCompletionCount();
  document.getElementById('wordenProgress').style.width = (completed / 4 * 100) + '%';
}

function renderWordenPanels() {
  const panels = document.getElementById('taskPanels');
  const data = loadSavedData();

  panels.innerHTML = wordenTasks.map((task, i) => {
    const activeClass = i === currentTaskIndex ? 'active' : '';
    const reflectionsHtml = task.reflections.map((r, ri) => {
      const key = `${task.id}_r${ri}`;
      const value = data[key] || '';
      return `
        <div class="reflection-group">
          <div class="reflection-label">${r.prompt}</div>
          <textarea class="reflection-textarea" id="${key}"
            placeholder="${r.placeholder}"
            oninput="autoSaveReflection('${key}', this.value)">${value}</textarea>
        </div>`;
    }).join('');

    const nextBtn = i < 3
      ? `<button class="btn-primary" onclick="switchTask(${i+1})">前往${wordenTasks[i+1].shortTitle}</button>`
      : `<button class="btn-primary" onclick="showWordenSummary()">查看完成狀態</button>`;
    const prevBtn = i > 0
      ? `<button class="btn-secondary" onclick="switchTask(${i-1})">回到${wordenTasks[i-1].shortTitle}</button>`
      : '';

    return `
      <div class="task-panel ${activeClass}" id="panel-${task.id}">
        <div class="task-description">
          <h3>${task.title}</h3>
          <p>${task.description}</p>
        </div>
        ${reflectionsHtml}
        <div class="task-actions">${prevBtn}${nextBtn}</div>
      </div>`;
  }).join('');
}

let saveTimeout;
function autoSaveReflection(key, value) {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    const data = loadSavedData();
    data[key] = value;
    saveData(data);
    renderWordenNav();
  }, 800);
}

function switchTask(index) {
  currentTaskIndex = index;
  renderWordenNav();
  document.querySelectorAll('.task-panel').forEach((p, i) => {
    p.classList.toggle('active', i === index);
  });
}

function showWordenSummary() {
  const completed = getCompletionCount();
  const total = 4;
  let msg = '';
  if (completed === total) {
    msg = '你已經完成了四項任務的反思。你可以隨時回來修改或補充。記住，這些任務不是線性的——你可能會在不同時期反覆經歷它們。';
  } else {
    msg = `你已完成 ${completed}/${total} 項任務的反思。沒有完成所有任務也完全沒關係——有些任務可能目前還不適用於你，或你還沒有準備好面對。`;
  }
  alert(msg);
}

renderWordenNav();
renderWordenPanels();
</script>
